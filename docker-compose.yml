services:

  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: notify-hub-postgres
    environment:
      POSTGRES_DB:       notifyhub
      POSTGRES_USER:     notifyhub
      POSTGRES_PASSWORD: notifyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifyhub -d notifyhub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────────
  # Zookeeper  (gerencia metadados do Kafka)
  # ──────────────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: notify-hub-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      # Usa o admin HTTP server (porta 8080) — sem restrição de whitelist de four-letter commands
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/commands/ruok | grep -q '\"error\" : null'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────────
  # Kafka
  # Dois listeners:
  #   PLAINTEXT        → container-to-container (kafka:29092)
  #   PLAINTEXT_HOST   → host machine           (localhost:9092)
  # ──────────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: notify-hub-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              168
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────────────
  # Redis  (deduplicação + cache de estado)
  # ──────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notify-hub-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # MailHog  (SMTP stub para desenvolvimento — captura e-mails sem enviá-los)
  # UI: http://localhost:8025
  # ──────────────────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: notify-hub-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ──────────────────────────────────────────────────────────────────────────
  # Kafka UI  (exploração de tópicos e mensagens)
  # UI: http://localhost:8090
  # ──────────────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: notify-hub-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:              local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS:  kafka:29092

  # ──────────────────────────────────────────────────────────────────────────
  # notify-hub Application
  # ──────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notify-hub-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL:       jdbc:postgresql://postgres:5432/notifyhub
      DB_USER:      notifyhub
      DB_PASS:      notifyhub
      KAFKA_SERVERS: kafka:29092
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      SMTP_HOST:    mailhog
      SMTP_PORT:    1025
      # JWT_SECRET deve ter ao menos 32 chars — troque em produção via secret manager
      JWT_SECRET:   "local-dev-secret-32chars-minimum!"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ──────────────────────────────────────────────────────────────────────────
  # Prometheus
  # ──────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: notify-hub-prometheus
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

  # ──────────────────────────────────────────────────────────────────────────
  # Grafana  (login: admin / admin)
  # Dashboard pré-provisionado em: http://localhost:3000
  # ──────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: notify-hub-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/notify-hub-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
