global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: local

scrape_configs:
  - job_name: notify-hub
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['app:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: notify-hub

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
