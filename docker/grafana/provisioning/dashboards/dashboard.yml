apiVersion: 1

providers:
  - name: notify-hub
    orgId: 1
    folder: notify-hub
    folderUid: notify-hub
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
