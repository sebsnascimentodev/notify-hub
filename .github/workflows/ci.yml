name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  IMAGE_NAME: notify-hub

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Compile + unit/integration tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       notifyhub_test
          POSTGRES_USER:     notifyhub
          POSTGRES_PASSWORD: notifyhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U notifyhub -d notifyhub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw verify -B -Dspring.profiles.active=test
        env:
          DB_URL:     jdbc:postgresql://localhost:5432/notifyhub_test
          DB_USER:    notifyhub
          DB_PASS:    notifyhub
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-secret-minimum-32-chars-long!

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Docker image build (without push — validates Dockerfile correctness)
  # ──────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Validate docker-compose.yml syntax
  # ──────────────────────────────────────────────────────────────────────────
  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
