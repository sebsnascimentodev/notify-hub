# Perfil prod: stubs desativados, TLS obrigatório, logs mínimos
spring:
  mail:
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.ssl.checkserveridentity: true

  jpa:
    properties:
      hibernate:
        format_sql: false

resilience4j:
  circuitbreaker:
    instances:
      email:
        wait-duration-in-open-state: 60s
      webhook:
        wait-duration-in-open-state: 60s

management:
  endpoint:
    health:
      show-details: never   # não expõe detalhes de infra sem autenticação

logging:
  level:
    tech.cuia.notifyhub: WARN
    root: ERROR
